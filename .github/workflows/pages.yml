name: Deploy frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages artifact
        env:
          API_BASE: ${{ secrets.API_BASE }}
        run: |
          if [ -z "${API_BASE:-}" ]; then
            echo "::error::Set repository secret API_BASE to your Render API root, e.g. https://your-app.onrender.com (no trailing slash). Settings → Secrets and variables → Actions."
            exit 1
          fi
          chmod +x scripts/build-frontend-static.sh
          ./scripts/build-frontend-static.sh public
          ls -la public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

