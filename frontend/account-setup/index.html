<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalanceWhiz — Account setup</title>
    <link rel="icon" href="../favicon.png" type="image/png" />
    <script>window.API_BASE = "__API_BASE__";</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css?v=200" />
  </head>
  <body class="login-page signup-page account-setup-page">
    <div class="container">
      <div class="top-nav" role="banner" aria-label="App header">
        <div class="top-nav__inner top-nav__inner--simple">
          <div class="top-nav__title" aria-label="App title">
            <h1 class="app-title app-title--logo">
              <a href="/" aria-label="Balance Whiz home">
                <img
                  class="app-logo"
                  src="../assets/balance-whiz-logo.png?v=20260504"
                  width="220"
                  height="56"
                  alt="Balance Whiz"
                  decoding="async"
                  fetchpriority="high"
                />
              </a>
            </h1>
          </div>
          <div class="top-nav__actions" aria-label="Account actions">
            <button type="button" class="top-nav__logout" onclick="window.location.href='/login.html'">Login</button>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="auth-section__head auth-section__head--signup-plan" id="signupBannerHead" hidden>
          <div id="signupPlanNote" class="callout callout--muted" style="display:none" role="status"></div>
        </div>
        <div id="signupCallout" class="callout" style="display:none" role="status"></div>

        <div id="accountSetupCards" class="account-setup-cards" aria-label="Account setup">
          <section class="card auth-section auth-section--open account-setup-card" data-as-card="login" aria-label="Create login">
            <div class="account-setup-card__head">
              <button type="button" class="account-setup-card__toggle" aria-expanded="true">
                <span class="account-setup-card__title">Create Login</span>
              </button>
            </div>
            <div class="auth-section__body account-setup-card__body">

              <div class="row two">
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="firstName">First Name</label></div>
                  <div class="form-row-h__field"><input id="firstName" type="text" autocomplete="given-name" /></div>
                </div>
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="lastName">Last Name</label></div>
                  <div class="form-row-h__field"><input id="lastName" type="text" autocomplete="family-name" /></div>
                </div>
              </div>

              <div style="height: 14px;"></div>

              <div class="row">
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="email">Email</label></div>
                  <div class="form-row-h__field"><input id="email" type="email" autocomplete="email" /></div>
                </div>
              </div>

              <div style="height: 10px;"></div>

              <div class="row">
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="password">Password</label></div>
                  <div class="form-row-h__field"><input id="password" type="password" autocomplete="new-password" /></div>
                </div>
              </div>

              <div style="height: 10px;"></div>

              <div class="row">
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="password2">Confirm password</label></div>
                  <div class="form-row-h__field"><input id="password2" type="password" autocomplete="new-password" /></div>
                </div>
              </div>
            </div>
          </section>

          <section class="card auth-section auth-section--open account-setup-card" data-as-card="account" aria-label="Add checking account">
            <div class="account-setup-card__head">
              <button type="button" class="account-setup-card__toggle" aria-expanded="true">
                <span class="account-setup-card__title">Add Checking Account</span>
              </button>
            </div>
            <div class="auth-section__body account-setup-card__body">
              <p class="meta" style="margin: 0 0 12px">Enter your checking account balance to get started today</p>

              <div class="row">
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="accountName">Account name</label></div>
                  <div class="form-row-h__field"><input id="accountName" type="text" placeholder="e.g. Checking" /></div>
                </div>
              </div>

              <div style="height:10px;"></div>

              <div class="row two">
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="accountStartingBalance">Starting balance</label></div>
                  <div class="form-row-h__field">
                    <div class="money-input">
                      <span class="money-input__prefix" aria-hidden="true">$</span>
                      <input id="accountStartingBalance" type="number" step="0.01" placeholder="0.00" />
                    </div>
                  </div>
                </div>
                <div class="form-row-h">
                  <div class="form-row-h__label"><label for="accountStartingBalanceDate">Starting balance date</label></div>
                  <div class="form-row-h__field"><input id="accountStartingBalanceDate" type="date" /></div>
                </div>
              </div>
            </div>
          </section>

          <section class="card auth-section auth-section--open account-setup-card" data-as-card="transactions" aria-label="Enter transactions">
            <div class="account-setup-card__head">
              <button type="button" class="account-setup-card__toggle" aria-expanded="true">
                <span class="account-setup-card__title">Enter Transactions</span>
              </button>
            </div>
            <div class="auth-section__body account-setup-card__body">

              <div class="form-row-h">
                <div class="form-row-h__label"><label>Type</label></div>
                <div class="form-row-h__field">
                  <div class="kind-toggle" role="radiogroup" aria-label="Transaction type">
                    <label class="kind-opt"><input type="radio" name="asTxKind" value="expense" checked /> Expense</label>
                    <label class="kind-opt"><input type="radio" name="asTxKind" value="income" /> Income</label>
                  </div>
                </div>
              </div>

              <div class="tx-add-vspace" aria-hidden="true"></div>

              <div class="form-row-h">
                <div class="form-row-h__label"><label for="asTxAmount">Amount</label></div>
                <div class="form-row-h__field">
                  <div class="money-input">
                    <span class="money-input__prefix" aria-hidden="true">$</span>
                    <input id="asTxAmount" type="number" min="0" step="0.01" placeholder="0.00" />
                  </div>
                </div>
              </div>

              <div class="tx-add-vspace" aria-hidden="true"></div>

              <div class="form-row-h">
                <div class="form-row-h__label"><label for="asTxCategory">Category</label></div>
                <div class="form-row-h__field">
                  <input id="asTxCategory" type="text" placeholder="Type to filter…" />
                </div>
              </div>

              <div class="tx-add-vspace" aria-hidden="true"></div>

              <div class="cat-color-row" aria-label="Select color (optional)">
                <div class="cat-color-row__label">Select color (optional)</div>
                <div class="cat-color-row__swatches" id="asTxColorSwatches">
                  <button type="button" class="cat-swatch" data-bg="#22d3ee" aria-label="Color 1"></button>
                  <button type="button" class="cat-swatch" data-bg="#fbbf24" aria-label="Color 2"></button>
                  <button type="button" class="cat-swatch" data-bg="#fb923c" aria-label="Color 3"></button>
                  <button type="button" class="cat-swatch" data-bg="#a855f7" aria-label="Color 4"></button>
                  <button type="button" class="cat-swatch" data-bg="#ef4444" aria-label="Color 5"></button>
                  <button type="button" class="cat-swatch" data-bg="#fde047" aria-label="Color 6"></button>
                  <button type="button" class="cat-swatch" data-bg="#06b6d4" aria-label="Color 7"></button>
                  <button type="button" class="cat-swatch" data-bg="#9ca3af" aria-label="Color 8"></button>
                  <button type="button" class="cat-swatch" data-bg="#94a3b8" aria-label="Color 9"></button>
                  <button type="button" class="cat-swatch" data-bg="#c4b5fd" aria-label="Color 10"></button>
                  <button type="button" class="cat-swatch" data-bg="#111827" aria-label="Color 11"></button>
                  <button type="button" class="cat-swatch" data-bg="#22c55e" aria-label="Color 12"></button>
                </div>
                <button type="button" class="cat-color-row__clear secondary" id="asTxColorClear">Clear</button>
                <input type="hidden" id="asTxBgColor" value="" />
              </div>

              <div class="tx-add-vspace" aria-hidden="true"></div>

              <div class="form-row-h">
                <div class="form-row-h__label"><label for="asTxDate">Date</label></div>
                <div class="form-row-h__field"><input id="asTxDate" type="date" /></div>
              </div>

              <div class="tx-add-vspace tx-add-vspace--lg" aria-hidden="true"></div>

              <label class="reimbursable-field" for="asTxRecurring">
                <span class="reimbursable-field__label">Make this recurring?</span>
                <input id="asTxRecurring" type="checkbox" />
              </label>

              <div class="tx-add-vspace" aria-hidden="true"></div>

              <div class="form-row-h">
                <div class="form-row-h__label"><label for="asTxNotes">Notes</label></div>
                <div class="form-row-h__field">
                  <input id="asTxNotes" type="text" maxlength="500" class="input-notes-flex" placeholder="Optional" />
                </div>
              </div>
            </div>
          </section>
        </div>

        <div style="height:10px;"></div>
        <div id="accountSetupActions" class="account-setup-actions">
          <button type="button" id="addMoreTxBtn" class="secondary">
            Add More Transactions
          </button>
          <button type="button" id="signupBtn" class="top-nav__logout" onclick="window.__bwSignup && window.__bwSignup()">
            Create Account
          </button>
        </div>
      </div>

      <footer class="app-footer" role="contentinfo">
        <div class="app-footer__inner">
          <span class="app-footer__brand" aria-hidden="true"></span>
          <a href="/contactus/" class="app-footer__link">Contact Us</a>
        </div>
      </footer>
    </div>

    <script src="../signup/signup.js?v=6"></script>
  </body>
</html>
