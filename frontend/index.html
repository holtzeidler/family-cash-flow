<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Family Cash Flow</title>
    <script>window.API_BASE = "__API_BASE__";</script>
    <link rel="stylesheet" href="./styles.css?v=20" />
  </head>
  <body>
    <div class="container">
      <div id="familiesErr" class="error"></div>

      <div class="app-layout">
        <aside class="sidebar">
          <div class="sidebar-top">
            <h1>Family Cash Flow</h1>
            <div class="header-actions">
              <!-- Kept for JS (active family); hidden — single-family workflow for now -->
              <select id="familySelect" class="family-select-hidden" aria-hidden="true" tabindex="-1"></select>
              <div class="pill" id="userPill">Loading...</div>
              <button type="button" id="logoutBtn">Logout</button>
            </div>
          </div>

          <div class="card">
            <h2>Add One-Time Transactions</h2>
            <div class="row two">
              <div>
                <label for="txDate">Date</label>
                <input id="txDate" type="date" />
              </div>
              <div>
                <label for="txKind">Type</label>
                <select id="txKind">
                  <option value="expense" selected>Expense</option>
                  <option value="income">Income</option>
                </select>
              </div>
            </div>
            <div style="height:10px;"></div>
            <div class="row-desc-notes">
              <div class="field-desc-short">
                <label for="txDesc">Description</label>
                <input id="txDesc" type="text" maxlength="12" class="input-desc-short" placeholder="e.g. Rent" />
              </div>
              <div class="field-notes-flex">
                <label for="txNotes">Notes</label>
                <input id="txNotes" type="text" maxlength="500" class="input-notes-flex" placeholder="Optional" />
              </div>
            </div>
            <div style="height:10px;"></div>
            <div class="row two">
              <div>
                <label for="txAmount">Amount (number)</label>
                <input id="txAmount" type="number" min="0" step="0.01" placeholder="0.00" />
              </div>
              <div>
                <label for="txCategoryId">Category</label>
                <select id="txCategoryId"></select>
              </div>
            </div>
            <div style="height:10px;"></div>
            <button id="addTxBtn">Add transaction</button>
            <div id="addTxErr" class="error"></div>
          </div>

          <div class="card">
            <h2>Add Recurring Transactions</h2>
            <div class="row three row-recurring-head">
              <div>
                <label for="expectedStartDate">Start</label>
                <input id="expectedStartDate" type="date" title="First occurrence date" />
              </div>
              <div>
                <label for="expectedRecurrence">Recurrence</label>
                <select id="expectedRecurrence" title="How often this repeats">
                  <option value="monthly" selected>Monthly</option>
                  <option value="weekly">Weekly</option>
                  <option value="semiannual">Twice yearly (every 6 months)</option>
                  <option value="yearly">Yearly</option>
                  <option value="once">Once</option>
                </select>
              </div>
              <div>
                <label for="expectedLastTxnDate" title="Optional. Last day a scheduled occurrence may fall on. Blank = no end.">Last txn</label>
                <input
                  id="expectedLastTxnDate"
                  type="date"
                  title="Optional. Last calendar day for an occurrence. Leave blank for no end date."
                />
              </div>
            </div>
            <div style="height:10px;"></div>

            <div class="row two">
              <div>
                <label for="expectedKind">Type</label>
                <select id="expectedKind">
                  <option value="expense" selected>Withdrawal / Expense</option>
                  <option value="income">Income</option>
                </select>
              </div>
              <div>
                <label for="expectedAmount">Amount</label>
                <input id="expectedAmount" type="number" min="0" step="0.01" placeholder="0.00" />
              </div>
            </div>

            <div style="height:10px;"></div>
            <div class="row-desc-notes">
              <div class="field-desc-short">
                <label for="expectedDesc">Description</label>
                <input id="expectedDesc" type="text" maxlength="12" class="input-desc-short" placeholder="e.g. Electric" />
              </div>
              <div class="field-notes-flex">
                <label for="expectedNotes">Notes</label>
                <input id="expectedNotes" type="text" maxlength="500" class="input-notes-flex" placeholder="Optional" />
              </div>
            </div>

            <div style="height:10px;"></div>
            <div class="row two">
              <div>
                <label for="expectedAccountId">Account</label>
                <select id="expectedAccountId"></select>
              </div>
              <div>
                <label for="expectedCategoryId">Category (optional)</label>
                <select id="expectedCategoryId"></select>
              </div>
            </div>

            <div style="height:10px;"></div>
            <button id="addExpectedTxBtn">Add recurring transaction</button>
            <div id="expectedTxErr" class="error"></div>
            <div class="list" id="expectedTxList"></div>
          </div>

          <div class="card">
            <h2>Accounts</h2>
            <div class="row two">
              <div>
                <label for="accountName">Account name</label>
                <input id="accountName" type="text" placeholder="e.g. Checking" />
              </div>
              <div>
                <label for="accountType">Type</label>
                <select id="accountType">
                  <option value="checking" selected>Checking</option>
                  <option value="savings">Savings</option>
                  <option value="credit_card">Credit card</option>
                  <option value="cash">Cash</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <div style="height:10px;"></div>
            <div class="row two">
              <div>
                <label for="accountStartingBalance">Starting balance</label>
                <input id="accountStartingBalance" type="number" step="0.01" placeholder="0.00" />
              </div>
              <div>
                <label for="accountStartingBalanceDate">Starting balance date</label>
                <input id="accountStartingBalanceDate" type="date" />
              </div>
            </div>
            <input id="accountEditId" type="hidden" />
            <div style="height:10px;"></div>
            <div class="row two">
              <button id="addAccountBtn">Add account</button>
              <button id="saveAccountEditBtn" class="danger">Save balance/date edit</button>
            </div>
            <button id="cancelAccountEditBtn">Cancel account edit</button>
            <div id="accErr" class="error"></div>
            <div class="list" id="accountsList"></div>
          </div>

          <div class="card">
            <h2>Categories</h2>
            <div class="row two">
              <div>
                <label for="categorySelect">Choose category</label>
                <select id="categorySelect"></select>
              </div>
              <div>
                <label for="newCategoryName">New category</label>
                <input id="newCategoryName" type="text" placeholder="e.g. Groceries" />
              </div>
            </div>
            <div style="height:10px;"></div>
            <button id="addCategoryBtn">Add category</button>
            <div id="catErr" class="error"></div>
          </div>

          <div class="card">
            <h2>Month summary</h2>
            <div class="row two">
              <div>
                <label for="monthInput">Month</label>
                <input id="monthInput" type="month" />
              </div>
              <div style="display:flex; align-items:end;">
                <button id="refreshBtn" style="width:100%;">Refresh</button>
              </div>
            </div>
            <div style="height:12px;"></div>
            <div class="totals" id="totals"></div>
            <div id="txErr" class="error"></div>
          </div>
        </aside>

        <div class="main-column">
          <div class="card calendar-panel" id="calendarPanel">
            <div class="calendar-panel-head">
              <h2>Calendar (Monthly)</h2>
              <button
                type="button"
                class="calendar-collapse-btn"
                id="calendarCollapseBtn"
                aria-expanded="true"
                aria-controls="calendarPanelBody"
                title="Collapse calendar"
              >
                <svg class="calendar-collapse-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </button>
            </div>
            <div id="calendarPanelBody" class="calendar-panel-body">
            <div class="row two">
              <div class="calendar-nav-block">
                <div class="calendar-nav">
                  <button type="button" class="nav-link" id="calendarPrevMonth">Prev</button>
                  <div class="calendar-pickers calendar-pickers-grid">
                    <label for="calendarMonthNum" class="cal-picker-label">Month</label>
                    <span class="cal-picker-label cal-picker-label-spacer" aria-hidden="true">&nbsp;</span>
                    <label for="calendarYear" class="cal-picker-label">Year</label>
                    <select id="calendarMonthNum">
                      <option value="1">January</option>
                      <option value="2">February</option>
                      <option value="3">March</option>
                      <option value="4">April</option>
                      <option value="5">May</option>
                      <option value="6">June</option>
                      <option value="7">July</option>
                      <option value="8">August</option>
                      <option value="9">September</option>
                      <option value="10">October</option>
                      <option value="11">November</option>
                      <option value="12">December</option>
                    </select>
                    <button type="button" class="nav-link cal-today-link" id="calendarGoToday" title="Go to current month">
                      Today
                    </button>
                    <select id="calendarYear"></select>
                  </div>
                  <button type="button" class="nav-link" id="calendarNextMonth">Next</button>
                </div>
                <input type="hidden" id="calendarMonth" />
              </div>
              <div>
                <label for="calendarMode">Show</label>
                <select id="calendarMode">
                  <option value="both" selected>Actual + Expected</option>
                  <option value="actual">Actual only</option>
                  <option value="expected">Expected only</option>
                </select>
              </div>
            </div>
            <div style="height:12px;"></div>
            <div id="calendarErr" class="error"></div>
            <div class="calendar-scroll">
              <div id="calendarGrid"></div>
            </div>
            </div>
          </div>

          <div class="main-column-aux">
          <div class="card chart-card" id="chartPanel">
            <div class="chart-panel-head">
              <h2>Projected balance chart (daily)</h2>
              <button
                type="button"
                class="calendar-collapse-btn"
                id="chartCollapseBtn"
                aria-expanded="true"
                aria-controls="chartPanelBody"
                title="Collapse chart"
              >
                <svg class="calendar-collapse-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </button>
            </div>
            <div id="chartPanelBody" class="chart-panel-body">
            <div class="chart-panel-controls">
                <div class="chart-ctrl chart-ctrl-start">
                  <label for="chartStart">Start date</label>
                  <input id="chartStart" type="date" />
                </div>
                <div class="chart-ctrl chart-ctrl-zoom">
                  <label for="chartDaysRange">Horizon (days)</label>
                  <div class="chart-zoom-row">
                    <input id="chartDaysRange" type="range" min="1" max="4000" step="1" value="365" />
                    <span class="meta chart-days-meta" id="chartDaysLabel">365 days</span>
                  </div>
                </div>
                <button type="button" id="runProjectionChartBtn" class="chart-update-btn">Update</button>
            </div>
            <div class="chart-duration-bar" role="tablist" aria-label="Chart range preset">
              <button type="button" class="chart-duration-btn" data-preset="1D" title="1 day">1D</button>
              <button type="button" class="chart-duration-btn" data-preset="5D" title="5 days">5D</button>
              <button type="button" class="chart-duration-btn" data-preset="1M" title="1 month">1M</button>
              <button type="button" class="chart-duration-btn" data-preset="6M" title="6 months">6M</button>
              <button type="button" class="chart-duration-btn" data-preset="YTD" title="From start date through Dec 31">YTD</button>
              <button type="button" class="chart-duration-btn" data-preset="1Y" title="1 year">1Y</button>
              <button type="button" class="chart-duration-btn" data-preset="5Y" title="5 years">5Y</button>
              <button type="button" class="chart-duration-btn" data-preset="MAX" title="Maximum (4000 days)">MAX</button>
            </div>
            <div id="chartErr" class="error"></div>
            <div class="projection-chart-wrap">
              <div id="projectionChartEmpty" class="projection-chart-empty" style="display: none" aria-live="polite"></div>
              <canvas id="projectionChartCanvas" class="projection-chart-canvas"></canvas>
            </div>
            </div>
          </div>

          <div class="card">
            <h2>Edit expected transaction instance</h2>
            <div class="row two">
              <div>
                <label for="instanceDate">Instance date</label>
                <input id="instanceDate" type="date" readonly />
              </div>
              <div>
                <label for="instanceExpectedTxId">Expected transaction</label>
                <input id="instanceExpectedTxId" type="text" readonly />
              </div>
            </div>
            <div style="height:10px;"></div>
            <div class="row two">
              <div>
                <label for="instanceKind">Type</label>
                <select id="instanceKind">
                  <option value="expense" selected>Withdrawal / Expense</option>
                  <option value="income">Income</option>
                </select>
              </div>
              <div>
                <label for="instanceAmount">Amount</label>
                <input id="instanceAmount" type="number" min="0" step="0.01" placeholder="0.00" />
              </div>
            </div>
            <div style="height:10px;"></div>
            <div class="row-desc-notes">
              <div class="field-desc-short">
                <label for="instanceDesc">Description</label>
                <input id="instanceDesc" type="text" maxlength="12" class="input-desc-short" placeholder="e.g. Bill" />
              </div>
              <div class="field-notes-flex">
                <label for="instanceNotes">Notes (series)</label>
                <input id="instanceNotes" type="text" class="input-notes-flex input-notes-readonly" readonly tabindex="-1" title="Notes from the recurring series template" />
              </div>
            </div>
            <div style="height:10px;"></div>
            <div class="instance-scope-row" id="instanceScopeRow">
              <span class="instance-scope-label">Apply changes to</span>
              <div class="instance-scope-options">
                <label class="inline-label"
                  ><input type="radio" name="instanceSaveScope" id="instanceScopeThis" value="this" checked /> This occurrence
                  only</label
                >
                <label class="inline-label" id="instanceScopeFutureLabel"
                  ><input type="radio" name="instanceSaveScope" id="instanceScopeFuture" value="future" /> All future
                  occurrences</label
                >
              </div>
            </div>
            <div style="height:10px;"></div>
            <div class="row two">
              <div>
                <label for="instanceAccountId">Account</label>
                <select id="instanceAccountId"></select>
              </div>
              <div>
                <label for="instanceCategoryId">Category (optional)</label>
                <select id="instanceCategoryId"></select>
              </div>
            </div>
            <div style="height:12px;"></div>
            <div class="row two">
              <button id="saveInstanceOverrideBtn">Save override</button>
              <button class="danger" id="cancelInstanceOverrideBtn">Cancel occurrence</button>
            </div>
            <div id="expectedInstanceErr" class="error"></div>
          </div>

          <div class="card">
            <h2>5-year daily projection</h2>
            <div class="row two">
              <div>
                <label for="projectionStart">Start date</label>
                <input id="projectionStart" type="date" />
              </div>
              <div style="display:flex; align-items:end;">
                <button id="runProjectionBtn" style="width:100%;">Run projection</button>
              </div>
            </div>
            <div style="height:12px;"></div>
            <div class="totals" id="projectionSummary"></div>
            <div id="projectionErr" class="error"></div>
            <div class="list" id="projectionDailyList"></div>
          </div>

          <div class="card">
            <h2>Transactions</h2>
            <div class="list" id="txList"></div>
          </div>
          </div>
        </div>
      </div>
    </div>

    <div id="txEditModal" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-labelledby="txEditTitle">
        <h3 id="txEditTitle">Edit transaction</h3>
        <div id="txEditErr" class="error"></div>
        <input type="hidden" id="txEditId" />
        <label for="txEditDate">Date</label>
        <input id="txEditDate" type="date" />
        <div style="height: 10px"></div>
        <div class="row two">
          <div>
            <label for="txEditKind">Type</label>
            <select id="txEditKind">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div>
            <label for="txEditAmount">Amount</label>
            <input id="txEditAmount" type="number" min="0" step="0.01" placeholder="0.00" />
          </div>
        </div>
        <div style="height: 10px"></div>
        <div class="row-desc-notes">
          <div class="field-desc-short">
            <label for="txEditDesc">Description</label>
            <input id="txEditDesc" type="text" maxlength="12" class="input-desc-short" placeholder="Description" />
          </div>
          <div class="field-notes-flex">
            <label for="txEditNotes">Notes</label>
            <input id="txEditNotes" type="text" maxlength="500" class="input-notes-flex" placeholder="Optional" />
          </div>
        </div>
        <div style="height: 10px"></div>
        <label for="txEditCategoryId">Category</label>
        <select id="txEditCategoryId"></select>
        <div style="height: 14px"></div>
        <div class="row two">
          <button type="button" id="txEditSave">Save</button>
          <button type="button" id="txEditDelete" class="danger">Delete</button>
        </div>
        <div style="height: 8px"></div>
        <button type="button" id="txEditCancel" style="width: 100%">Cancel</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="./app.js?v=20"></script>
  </body>
</html>
