<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalanceWhiz</title>
    <link rel="icon" href="./favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=200" />
  </head>
  <body class="landing-page">
    <div class="container">
      <div class="top-nav" role="banner" aria-label="Primary">
        <div class="top-nav__inner top-nav__inner--simple">
          <div class="top-nav__title" aria-label="App title">
            <h1 class="app-title app-title--logo">
              <img
                class="app-logo"
                src="./assets/balance-whiz-logo.png?v=20260504"
                width="220"
                height="56"
                alt="Balance Whiz"
                decoding="async"
                fetchpriority="high"
              />
            </h1>
          </div>
          <div class="top-nav__actions" aria-label="Account actions">
            <a href="./login.html" class="top-nav__logout">Login</a>
          </div>
        </div>
      </div>

      <main class="landing-main" aria-label="Welcome">
        <div class="landing-hero">
          <p class="landing-hero__text">
            BalanceWhiz helps you see your future cash flow clearly so you can stay prepared, avoid surprises, and feel in
            control of what&rsquo;s ahead.
            <a href="./plans/" class="landing-hero__cta">See what&rsquo;s ahead &rarr;</a>
          </p>
        </div>
      </main>

      <footer class="app-footer" role="contentinfo">
        <div class="app-footer__inner">
          <span class="app-footer__brand" aria-hidden="true"></span>
          <a href="./contactus/" class="app-footer__link">Contact Us</a>
        </div>
      </footer>
    </div>
  </body>
</html>
