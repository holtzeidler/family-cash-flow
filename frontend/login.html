<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalanceWhiz</title>
    <link rel="icon" href="./favicon.png" type="image/png" />
    <script>window.API_BASE = "__API_BASE__";</script>
    <link rel="stylesheet" href="./styles.css?v=351" />
  </head>
  <body class="login-page">
    <div class="container">
      <div class="top-nav" role="banner" aria-label="App header">
        <div class="top-nav__inner top-nav__inner--simple">
          <div class="top-nav__title" aria-label="App title">
            <h1 class="app-title app-title--logo">
              <a href="/" aria-label="Balance Whiz home">
                <img
                  class="app-logo"
                  src="./assets/balance-whiz-logo.png?v=20260504"
                  width="204"
                  height="52"
                  alt="Balance Whiz"
                  decoding="async"
                  fetchpriority="high"
                />
              </a>
            </h1>
          </div>
        </div>
      </div>

      <div class="grid login-page__grid">
        <div class="login-page__split">
          <aside class="login-page__brand" aria-label="Why BalanceWhiz">
            <h2 class="login-page__brand-head">Know what’s safe before<br />bills hit.</h2>
            <p class="login-page__brand-sub">See what’s left after planned bills—not just today’s balance.</p>
            <figure class="login-page__brand-chart-wrap">
              <div class="login-page__brand-chart" aria-hidden="true">
                <svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                  <defs>
                    <linearGradient id="loginBrandChartFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="rgba(11, 61, 46, 0.28)" />
                      <stop offset="55%" stop-color="rgba(11, 61, 46, 0.08)" />
                      <stop offset="100%" stop-color="rgba(11, 61, 46, 0.02)" />
                    </linearGradient>
                    <linearGradient id="loginBrandChartFade" x1="0" y1="0" x2="1" y2="0">
                      <stop offset="0%" stop-color="rgba(255,255,255,0.22)" />
                      <stop offset="18%" stop-color="rgba(255,255,255,0)" />
                      <stop offset="82%" stop-color="rgba(255,255,255,0)" />
                      <stop offset="100%" stop-color="rgba(255,255,255,0.18)" />
                    </linearGradient>
                  </defs>
                  <rect x="8" y="12" width="304" height="72" rx="10" fill="rgba(4, 120, 87, 0.11)" />
                  <g opacity="0.62" stroke="rgba(11, 61, 46, 0.14)" stroke-width="1">
                    <line x1="12" y1="36" x2="308" y2="36" />
                    <line x1="12" y1="52" x2="308" y2="52" />
                    <line x1="12" y1="68" x2="308" y2="68" />
                    <line x1="12" y1="84" x2="308" y2="84" />
                  </g>
                  <line x1="20" y1="20" x2="20" y2="100" stroke="rgba(11, 61, 46, 0.14)" stroke-width="1" />
                  <path
                    d="M12,78 C52,72 88,86 128,70 C168,54 200,88 240,62 C272,44 300,38 308,36 L308,96 L12,96 Z"
                    fill="url(#loginBrandChartFill)"
                  />
                  <rect x="8" y="12" width="304" height="72" rx="10" fill="url(#loginBrandChartFade)" />
                  <path
                    d="M12,78 C52,72 88,86 128,70 C168,54 200,88 240,62 C272,44 300,38 308,36"
                    fill="none"
                    stroke="#062a20"
                    stroke-width="3.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="128" cy="70" r="4.5" fill="#047857" stroke="#fff" stroke-width="1.2" />
                  <text x="136" y="73" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8.5" font-weight="650" fill="rgba(11, 61, 46, 0.55)">Bill</text>
                  <circle cx="268" cy="42" r="4" fill="#a73744" stroke="#fff" stroke-width="1.1" opacity="0.92" />
                  <text x="276" y="45" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="8.5" font-weight="650" fill="rgba(167, 55, 68, 0.65)">Pay</text>
                </svg>
              </div>
              <figcaption class="login-page__brand-chart-caption">Projected balance, not just current balance</figcaption>
            </figure>
          </aside>
          <div class="login-page__form-col">
            <section class="card auth-section auth-section--open" id="loginSection" aria-label="Sign in">
              <div class="auth-section__head">
                <span class="auth-section__title">Welcome back</span>
              </div>
              <div class="auth-section__body" id="loginSectionBody">
                <div id="loginCallout" class="callout" style="display:none" role="status"></div>
                <div class="row two">
                  <div>
                    <label for="email">Email</label>
                    <input id="email" type="email" autocomplete="email" />
                  </div>
                  <div>
                    <label for="password">Password</label>
                    <input id="password" type="password" autocomplete="current-password" />
                  </div>
                </div>
                <button type="button" id="loginBtn" class="top-nav__logout" onclick="window.__bwLogin && window.__bwLogin()">Login</button>
                <a href="./contactus/" class="login-page__forgot-link">Forgot password?</a>
                <div class="login-page__signup-prompt">
                  <span>Don’t have an account?</span>
                  <a href="https://balancewhiz.com/account-setup/?fresh=1" class="login-page__signup-cta">Create your forecast</a>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>

      <footer class="app-footer" role="contentinfo">
        <div class="app-footer__inner">
          <span class="app-footer__brand" aria-hidden="true"></span>
          <a href="./contactus/" class="app-footer__link">Contact Us</a>
        </div>
      </footer>
    </div>

    <script src="./login.js?v=5"></script>
  </body>
</html>
