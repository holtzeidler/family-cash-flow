<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalanceWhiz</title>
    <link rel="icon" href="./favicon.png" type="image/png" />
    <script>window.API_BASE = "__API_BASE__";</script>
    <link rel="stylesheet" href="./styles.css?v=201" />
  </head>
  <body class="login-page">
    <div class="container">
      <div class="top-nav" role="banner" aria-label="App header">
        <div class="top-nav__inner top-nav__inner--simple">
          <div class="top-nav__title" aria-label="App title">
            <h1 class="app-title app-title--logo">
              <img
                class="app-logo"
                src="./assets/balance-whiz-logo.png?v=20260504"
                width="220"
                height="56"
                alt="Balance Whiz"
                decoding="async"
                fetchpriority="high"
              />
            </h1>
          </div>
        </div>
      </div>

      <div class="grid">
        <section class="card auth-section auth-section--open" id="loginSection" aria-label="Login">
          <button
            type="button"
            class="auth-section__head"
            id="loginSectionToggle"
            aria-expanded="true"
            aria-controls="loginSectionBody"
          >
            <span class="auth-section__title">Login</span>
            <span class="auth-section__chev" aria-hidden="true">▾</span>
          </button>
          <div class="auth-section__body" id="loginSectionBody">
            <div id="loginCallout" class="callout" style="display:none" role="status"></div>
            <div class="row two">
              <div>
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="email" />
              </div>
              <div>
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" />
              </div>
            </div>
            <div style="height:10px;"></div>
            <button type="button" id="loginBtn" onclick="window.__bwLogin && window.__bwLogin()">Login</button>
            <div style="height:12px;"></div>
            <div style="font-size: 18px; text-align: left;">
              Don't have an account?
              <a href="./plans/" style="margin-left: 6px;">Sign up now</a>
            </div>
          </div>
        </section>
      </div>

      <footer class="app-footer" role="contentinfo">
        <div class="app-footer__inner">
          <span class="app-footer__brand" aria-hidden="true"></span>
          <a href="./contactus/" class="app-footer__link">Contact Us</a>
        </div>
      </footer>
    </div>

    <script src="./login.js?v=3"></script>
  </body>
</html>
