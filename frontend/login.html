<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalanceWhiz</title>
    <script>window.API_BASE = "__API_BASE__";</script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <div class="container">
      <div class="top-nav" role="banner" aria-label="App header">
        <div class="top-nav__inner top-nav__inner--simple">
          <div class="top-nav__title" aria-label="App title">
            <h1 class="app-title">Balance Whiz</h1>
          </div>
        </div>
      </div>

      <div class="grid">
        <section class="card auth-section auth-section--open" id="loginSection" aria-label="Login">
          <button
            type="button"
            class="auth-section__head"
            id="loginSectionToggle"
            aria-expanded="true"
            aria-controls="loginSectionBody"
          >
            <span class="auth-section__title">Login</span>
            <span class="auth-section__chev" aria-hidden="true">▾</span>
          </button>
          <div class="auth-section__body" id="loginSectionBody">
            <div id="loginCallout" class="callout" style="display:none" role="status"></div>
            <div id="loginDiagCallout" class="callout callout--muted" style="display:none" role="status"></div>
            <div class="row two">
              <div>
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="email" />
              </div>
              <div>
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" />
              </div>
            </div>
            <div style="height:10px;"></div>
            <button id="loginBtn">Login</button>
          </div>
        </section>

        <section class="card auth-section" id="registerSection" aria-label="Create account">
          <button
            type="button"
            class="auth-section__head"
            id="registerSectionToggle"
            aria-expanded="false"
            aria-controls="registerSectionBody"
          >
            <span class="auth-section__title">Create account</span>
            <span class="auth-section__chev" aria-hidden="true">▾</span>
          </button>
          <div class="auth-section__body" id="registerSectionBody" hidden>
            <div id="registerCallout" class="callout" style="display:none" role="status"></div>
            <div class="row two">
              <div>
                <label for="regName">Name (optional)</label>
                <input id="regName" type="text" autocomplete="name" />
              </div>
              <div>
                <label for="regEmail">Email</label>
                <input id="regEmail" type="email" autocomplete="email" />
              </div>
            </div>
            <div style="height:10px;"></div>
            <label for="regPassword">Password (min 8 chars)</label>
            <input id="regPassword" type="password" autocomplete="new-password" />
            <div style="height:10px;"></div>
            <button id="registerBtn">Register</button>
          </div>
        </section>
      </div>

      <footer class="app-footer" role="contentinfo">
        <div class="app-footer__inner">
          <span class="app-footer__brand" aria-hidden="true"></span>
          <a href="./contactus/" class="app-footer__link">Contact Us</a>
        </div>
      </footer>
    </div>

    <script src="./login.js"></script>
  </body>
</html>
