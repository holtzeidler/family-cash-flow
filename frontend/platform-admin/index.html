<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Balance Whiz — Platform admin</title>
    <link rel="icon" href="../favicon.png" type="image/png" />
    <script>window.API_BASE = "__API_BASE__";</script>
    <link rel="stylesheet" href="../styles.css?v=410" />
  </head>
  <body class="admin-page">
    <div class="container">
      <div class="top-nav" role="banner" aria-label="Admin header">
        <div class="top-nav__inner top-nav__inner--simple">
          <div class="top-nav__title">
            <h1 class="app-title">Platform admin</h1>
          </div>
          <div class="top-nav__actions">
            <button type="button" class="top-nav__logout" id="platformAdminBackBtn">Back to app</button>
          </div>
        </div>
      </div>

      <div class="platform-admin-layout">
        <aside class="platform-admin-sidebar card" aria-label="Admin sections">
          <div class="platform-admin-nav">
            <button type="button" class="platform-admin-nav__btn is-active" data-admin-section="overview">Overview</button>
            <button type="button" class="platform-admin-nav__btn" data-admin-section="users">Users</button>
            <button type="button" class="platform-admin-nav__btn" data-admin-section="families">Families</button>
            <button type="button" class="platform-admin-nav__btn" data-admin-section="feedback">Feedback</button>
            <button type="button" class="platform-admin-nav__btn is-disabled" disabled title="Coming later">Billing &amp; add-ons</button>
          </div>
        </aside>
        <main class="platform-admin-main card">
          <div id="adminCallout" class="callout" style="display: none" role="status"></div>
          <section id="adminSectionOverview" class="admin-section is-active">
            <h2>Overview</h2>
            <p id="adminOverviewText" class="meta">Loading…</p>
          </section>
          <section id="adminSectionUsers" class="admin-section" hidden>
            <h2>Users</h2>
            <p class="meta">Reset passwords and adjust family roles. Changes apply immediately.</p>
            <div class="platform-admin-users-toolbar">
              <label for="adminUsersSearch" class="sr-only">Search users</label>
              <input
                type="search"
                id="adminUsersSearch"
                class="platform-admin-users-search"
                placeholder="Search by email, name, or family…"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div id="adminUsersMount"></div>
          </section>
          <section id="adminSectionFamilies" class="admin-section" hidden>
            <h2>Families</h2>
            <p class="meta">Family names for quick reference. Use Users to change membership.</p>
            <div id="adminFamiliesMount"></div>
          </section>
          <section id="adminSectionFeedback" class="admin-section" hidden>
            <h2>Feedback</h2>
            <p class="meta">In-app feedback, quick reactions, and beta pulse responses from real users.</p>

            <div class="admin-feedback-toolbar">
              <div class="admin-feedback-toolbar__filters">
                <label class="admin-feedback-filter">
                  <span class="admin-feedback-filter__label">Kind</span>
                  <select id="adminFbKind">
                    <option value="">All</option>
                    <option value="bug">Bug / feedback</option>
                    <option value="reaction">Reaction</option>
                    <option value="pulse">Pulse</option>
                  </select>
                </label>
                <label class="admin-feedback-filter">
                  <span class="admin-feedback-filter__label">Status</span>
                  <select id="adminFbStatus">
                    <option value="">All</option>
                    <option value="new" selected>New</option>
                    <option value="in_progress">In progress</option>
                    <option value="resolved">Resolved</option>
                  </select>
                </label>
                <label class="admin-feedback-filter">
                  <span class="admin-feedback-filter__label">Category</span>
                  <select id="adminFbCategory">
                    <option value="">All</option>
                    <option value="Bug">Bug</option>
                    <option value="UX confusion">UX confusion</option>
                    <option value="Feature request">Feature request</option>
                    <option value="Praise">Praise</option>
                  </select>
                </label>
                <label class="admin-feedback-filter admin-feedback-filter--grow">
                  <span class="admin-feedback-filter__label">Search</span>
                  <input type="search" id="adminFbSearch" placeholder="Keyword in text, route, context…" />
                </label>
                <button type="button" id="adminFbRefresh" class="top-nav__logout">Refresh</button>
              </div>
              <p id="adminFbMeta" class="meta admin-feedback-toolbar__meta"></p>
            </div>

            <div id="adminFbMount" class="admin-feedback-list" aria-live="polite"></div>
          </section>
        </main>
      </div>
    </div>
    <style>
      .platform-admin-layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 16px;
        align-items: start;
        margin-top: 16px;
      }
      @media (max-width: 800px) {
        .platform-admin-layout {
          grid-template-columns: 1fr;
        }
      }
      .platform-admin-nav {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .platform-admin-nav__btn {
        text-align: left;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--cal-surface);
        cursor: pointer;
        font: inherit;
      }
      .platform-admin-nav__btn.is-active {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .platform-admin-nav__btn.is-disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .platform-admin-main {
        padding: 16px 18px;
        min-height: 320px;
      }
      .admin-section h2 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }
      .admin-user-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        background: var(--cal-surface);
        position: relative;
      }
      .admin-user-card h3 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      .admin-user-card__delete {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 8px 10px;
      }
      .admin-membership {
        font-size: 13px;
        margin: 6px 0;
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.04);
      }
      .admin-inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }
      .admin-inline-actions input[type="password"] {
        min-width: 160px;
      }
      .platform-admin-users-toolbar {
        margin: 12px 0 14px;
      }
      .platform-admin-users-search {
        width: 100%;
        max-width: 28rem;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel, #fff);
        font: inherit;
        font-size: 0.9375rem;
      }
      .platform-admin-users-search::placeholder {
        color: var(--muted);
      }
      .platform-admin-users-search:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(11, 61, 46, 0.12);
      }

      /* Feedback review */
      .admin-feedback-toolbar {
        margin: 12px 0 14px;
      }
      .admin-feedback-toolbar__filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: flex-end;
      }
      .admin-feedback-filter {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 140px;
      }
      .admin-feedback-filter--grow {
        flex: 1 1 240px;
      }
      .admin-feedback-filter__label {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .admin-feedback-filter select,
      .admin-feedback-filter input {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        font: inherit;
        font-size: 0.9rem;
      }
      .admin-feedback-toolbar__meta {
        margin: 6px 0 0;
      }
      .admin-feedback-list {
        display: grid;
        gap: 10px;
      }
      .admin-feedback-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        background: var(--cal-surface);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }
      .admin-feedback-card__head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        flex-wrap: wrap;
      }
      .admin-feedback-card__kind {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 11.5px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(71, 85, 105, 0.78);
      }
      .admin-feedback-card__kind-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--muted);
      }
      .admin-feedback-card[data-kind="bug"] .admin-feedback-card__kind-dot {
        background: #c2410c;
      }
      .admin-feedback-card[data-kind="reaction"] .admin-feedback-card__kind-dot {
        background: #0ea5e9;
      }
      .admin-feedback-card[data-kind="pulse"] .admin-feedback-card__kind-dot {
        background: #15803d;
      }
      .admin-feedback-card__time {
        font-size: 12px;
        color: var(--muted);
      }
      .admin-feedback-card__title {
        margin: 8px 0 6px;
        font-size: 0.95rem;
        font-weight: 600;
      }
      .admin-feedback-card__body {
        font-size: 0.92rem;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .admin-feedback-card__meta {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
        font-size: 12px;
        color: var(--muted);
      }
      .admin-feedback-card__meta strong {
        color: rgba(31, 41, 55, 0.86);
        font-weight: 600;
      }
      .admin-feedback-card__actions {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(17, 24, 39, 0.06);
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .admin-feedback-card__actions select,
      .admin-feedback-card__actions input {
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        font: inherit;
        font-size: 0.88rem;
      }
      .admin-feedback-card__actions textarea {
        flex: 1 1 240px;
        min-width: 160px;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        font: inherit;
        font-size: 0.88rem;
        resize: vertical;
      }
      .admin-feedback-card__save {
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      .admin-feedback-card__save:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .admin-feedback-card__screenshot {
        margin-top: 10px;
      }
      .admin-feedback-card__screenshot img {
        max-width: 100%;
        max-height: 420px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .admin-feedback-empty {
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }
    </style>
    <script src="./admin.js?v=7"></script>
  </body>
</html>
