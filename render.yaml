# Render Blueprint: production + staging stacks.
# https://render.com/docs/blueprint-spec
#
# Production API (branch main): set DATABASE_URL, JWT_SECRET, CORS_ORIGINS, ENV=production
# in the dashboard — do not reuse production DATABASE_URL for staging.
#
# Staging (branch staging): separate Postgres + API + static frontend. See docs/STAGING.md.

services:
  - type: web
    name: family-cash-flow-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    branch: main
    healthCheckPath: /docs

  - type: web
    name: family-cash-flow-api-staging
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    branch: staging
    healthCheckPath: /docs
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: family-cash-flow-db-staging
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: APP_PUBLIC_BASE_URL
        sync: false
      - key: STAGING_AUTH_EMAIL_ALLOWLIST
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: family-cash-flow-web-staging
    runtime: static
    branch: staging
    buildCommand: chmod +x scripts/build-frontend-static.sh && ./scripts/build-frontend-static.sh public-staging
    staticPublishPath: public-staging
    envVars:
      - key: API_BASE
        sync: false

databases:
  - name: family-cash-flow-db-staging
    databaseName: family_cash_flow_staging
    plan: free
